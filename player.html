<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Radio Player | Dëgjo live</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b2b3b 0%, #1b4f6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        /* Ekrani i parë – mbulesa me buton */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }
        .overlay.hide {
            opacity: 0;
            pointer-events: none;
        }
        .start-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            text-align: center;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3);
        }
        .start-card h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1f6e8c;
        }
        .start-card p {
            margin-bottom: 1.5rem;
            color: #4a627a;
        }
        .play-big-btn {
            background: #1f6e8c;
            border: none;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .play-big-btn:hover {
            background: #0e5a74;
            transform: scale(0.98);
        }
        /* Karta kryesore e player-it (fillimisht e fshehur) */
        .player-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
            padding: 2rem 1.5rem;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .player-card.visible {
            opacity: 1;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #1f6e8c, #0e2a38);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .station-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f6e8c;
            background: #eef7fc;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin: 0.8rem 0;
            word-break: break-word;
        }
        .audio-wrapper {
            background: #f0f4f8;
            border-radius: 60px;
            padding: 0.8rem 1rem;
            margin: 1.2rem 0;
        }
        audio {
            width: 100%;
            outline: none;
            border-radius: 40px;
        }
        .status {
            font-size: 0.9rem;
            margin: 0.8rem 0;
            padding: 0.5rem;
            border-radius: 50px;
            display: inline-block;
            min-width: 160px;
        }
        .status.playing { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .meta-info {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6c86a3;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }
        @media (max-width: 500px) {
            .player-card { padding: 1.5rem; }
            h1 { font-size: 1.7rem; }
            .station-name { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <!-- Ekrani i parë (overlay) që kërkon klikim -->
    <div id="overlay" class="overlay">
        <div class="start-card">
            <h2>🎧 Radio Player</h2>
            <p>Kliko butonin për të filluar</p>
            <button id="startBtn" class="play-big-btn">▶ Dëgjo Radio</button>
        </div>
    </div>

    <!-- Player-i i vërtetë -->
    <div id="playerCard" class="player-card">
        <h1>RADIO PLAYER</h1>
        <div id="stationName" class="station-name">—</div>
        <div class="audio-wrapper">
            <audio id="audio" controls preload="auto"></audio>
        </div>
        <div id="status" class="status">⏳ Duke përgatitur...</div>
        <div class="meta-info">
            📡 Transmetim live • Për cilësi më të mirë përdorni lidhje të qëndrueshme
        </div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let streamUrl = urlParams.get('stream');
            const stationName = urlParams.get('name') || 'Radio';

            const overlay = document.getElementById('overlay');
            const playerCard = document.getElementById('playerCard');
            const startBtn = document.getElementById('startBtn');
            const audioElem = document.getElementById('audio');
            const stationSpan = document.getElementById('stationName');
            const statusDiv = document.getElementById('status');

            if (!streamUrl) {
                statusDiv.innerHTML = '❌ Parametri "stream" mungon.';
                statusDiv.className = 'status error';
                stationSpan.innerText = 'Gabim në lidhje';
                overlay.style.display = 'none';
                playerCard.classList.add('visible');
                return;
            }

            // Dekodimi i URL nëse është e koduar
            try {
                streamUrl = decodeURIComponent(streamUrl);
            } catch(e) { /* nëse është e dëmtuar */ }

            stationSpan.innerText = stationName;
            audioElem.src = streamUrl;
            audioElem.load();

            function setStatus(text, type) {
                statusDiv.innerHTML = text;
                statusDiv.className = `status ${type}`;
            }

            function startPlayback() {
                // Fshih overlay-in dhe shfaq player-in
                overlay.classList.add('hide');
                playerCard.classList.add('visible');

                // Tani luaj audio (kjo do të funksionojë sepse është pas klikimit)
                audioElem.play().then(() => {
                    setStatus('✅ Duke luajtur...', 'playing');
                }).catch(err => {
                    console.error('Gabim gjatë luajtjes:', err);
                    setStatus('❌ Nuk mund të luhet. Kontrollo URL-në.', 'error');
                });
            }

            // Kur përdoruesi klikon butonin e madh, fillon luajtja
            startBtn.addEventListener('click', startPlayback);

            // Eventet e audios për status (pasi të fillojë)
            audioElem.addEventListener('playing', () => {
                setStatus('✅ Duke luajtur...', 'playing');
            });
            audioElem.addEventListener('pause', () => {
                if (audioElem.currentTime > 0 && !audioElem.ended) {
                    setStatus('⏸ Pauzë', 'playing'); // nuk e konsideroj gabim
                }
            });
            audioElem.addEventListener('ended', () => {
                setStatus('⏹ Transmetimi përfundoi.', 'error');
            });
            audioElem.addEventListener('error', (e) => {
                console.error('Gabim audio:', e);
                let errMsg = '❌ Nuk mund të luhet. Kontrollo URL-në.';
                if (audioElem.networkState === 3) {
                    errMsg = '❌ Burimi nuk u gjet. URL e pasaktë ose server offline.';
                }
                setStatus(errMsg, 'error');
            });
        })();
    </script>
</body>
</html>
