<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Radio Player | Autoplay + Marquee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b2b3b 0%, #1b4f6e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .player-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
            padding: 2rem 1.5rem;
            text-align: center;
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #1f6e8c, #0e2a38);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        /* Marquee container */
        .marquee-container {
            background: #1f6e8c;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            margin: 0.8rem 0;
            overflow: hidden;
            white-space: nowrap;
        }
        .marquee-text {
            display: inline-block;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            animation: marquee 12s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        /* Për pajisje që nuk e mbështesin animacionin, thjesht qendro */
        @media (prefers-reduced-motion: reduce) {
            .marquee-text { animation: none; white-space: normal; word-break: break-word; }
        }

        .station-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f6e8c;
            background: #eef7fc;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin: 0.5rem 0;
        }
        .audio-wrapper {
            background: #f0f4f8;
            border-radius: 60px;
            padding: 0.8rem 1rem;
            margin: 1.2rem 0;
        }
        audio {
            width: 100%;
            outline: none;
            border-radius: 40px;
        }
        .status {
            font-size: 0.9rem;
            margin: 0.8rem 0;
            padding: 0.5rem;
            border-radius: 50px;
            display: inline-block;
            min-width: 160px;
        }
        .status.playing { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.waiting { background: #fff3cd; color: #856404; }
        button {
            background: #1f6e8c;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
        }
        button:hover {
            background: #0e5a74;
            transform: scale(0.98);
        }
        .meta-info {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6c86a3;
            border-top: 1px solid #e2e8f0;
            padding-top: 1rem;
        }
        @media (max-width: 500px) {
            .player-card { padding: 1.5rem; }
            h1 { font-size: 1.7rem; }
            .marquee-text { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="player-card">
    <h1>🎧 RADIO PLAYER</h1>

    <!-- Marquee që tregon emrin e stacionit -->
    <div class="marquee-container">
        <div class="marquee-text" id="marqueeText">🎵 Radio</div>
    </div>

    <div class="audio-wrapper">
        <audio id="audio" controls preload="auto"></audio>
    </div>

    <div id="status" class="status waiting">⏳ Duke nisur...</div>
    <button id="playBtn" style="display: none;">▶ Luaj manualisht</button>
    <div class="meta-info">
        📡 Transmetim live • Nëse nuk fillon, kliko butonin më lart.
    </div>
</div>

<script>
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let streamUrl = urlParams.get('stream');
        const stationName = urlParams.get('name') || 'Radio';

        const audioElem = document.getElementById('audio');
        const marqueeSpan = document.getElementById('marqueeText');
        const statusDiv = document.getElementById('status');
        const playBtn = document.getElementById('playBtn');

        if (!streamUrl) {
            statusDiv.innerHTML = '❌ Parametri "stream" mungon.';
            statusDiv.className = 'status error';
            marqueeSpan.innerText = 'Gabim në lidhje';
            return;
        }

        // Dekodimi i URL nëse është e koduar
        try {
            streamUrl = decodeURIComponent(streamUrl);
        } catch(e) { /* nëse është e dëmtuar */ }

        // Vendos emrin në marquee
        marqueeSpan.innerText = `🎵 ${stationName}  •  🎵 ${stationName}  •  🎵 ${stationName}`; // përsëritet për marquee më të gjatë

        // Vendos stream URL
        audioElem.src = streamUrl;
        audioElem.load();

        function setStatus(text, type) {
            statusDiv.innerHTML = text;
            statusDiv.className = `status ${type}`;
        }

        // Përpiqemi të luajmë automatikisht
        const playPromise = audioElem.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                setStatus('✅ Duke luajtur...', 'playing');
                playBtn.style.display = 'none';
            }).catch(err => {
                console.warn('Autoplay i bllokuar:', err);
                setStatus('🔊 Autoplay i bllokuar. Kliko butonin për të dëgjuar.', 'error');
                playBtn.style.display = 'inline-block';
            });
        } else {
            // Browser i vjetër, provo event
            audioElem.addEventListener('canplay', () => {
                audioElem.play().catch(e => {
                    setStatus('🔊 Kliko butonin për të dëgjuar.', 'error');
                    playBtn.style.display = 'inline-block';
                });
            });
        }

        // Butoni manual
        playBtn.addEventListener('click', () => {
            audioElem.play().then(() => {
                setStatus('✅ Duke luajtur...', 'playing');
                playBtn.style.display = 'none';
            }).catch(e => {
                setStatus('❌ Nuk mund të luhet. Kontrollo lidhjen.', 'error');
                console.error(e);
            });
        });

        // Evente për status
        audioElem.addEventListener('playing', () => {
            setStatus('✅ Duke luajtur...', 'playing');
            playBtn.style.display = 'none';
        });
        audioElem.addEventListener('pause', () => {
            if (audioElem.currentTime > 0 && !audioElem.ended) {
                setStatus('⏸ Pauzë', 'waiting');
                playBtn.style.display = 'inline-block';
            }
        });
        audioElem.addEventListener('ended', () => {
            setStatus('⏹ Transmetimi përfundoi.', 'error');
            playBtn.style.display = 'inline-block';
        });
        audioElem.addEventListener('error', (e) => {
            console.error('Gabim audio:', e);
            let errMsg = '❌ Nuk mund të luhet. Kontrollo URL-në.';
            if (audioElem.networkState === 3) {
                errMsg = '❌ Burimi nuk u gjet. URL e pasaktë ose server offline.';
            }
            setStatus(errMsg, 'error');
            playBtn.style.display = 'inline-block';
        });

        // Nëse pas 5 sekondash nuk ka ngjarje "canplay", trego buton
        setTimeout(() => {
            if (audioElem.readyState === 0 && playBtn.style.display === 'none') {
                setStatus('⚠️ Serveri nuk përgjigjet. Kliko butonin.', 'error');
                playBtn.style.display = 'inline-block';
            }
        }, 5000);
    })();
</script>
</body>
</html>
