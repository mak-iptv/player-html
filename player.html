<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Radio Player</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .radio-icon {
            font-size: 50px;
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        /* Marquee Rregulluar */
        .track-info-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 2rem;
            overflow: hidden; /* Ky rregull fsheh tekstin që del jashtë */
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .marquee-content {
            white-space: nowrap;
            position: absolute;
            will-change: transform;
            animation: marquee 12s linear infinite;
            padding-left: 100%; /* Fillon nga jashtë djathtas */
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .artist-name {
            font-weight: bold;
            color: #fff;
            font-size: 1.2rem;
            display: block;
        }

        .song-title {
            color: var(--primary);
            font-size: 1rem;
            display: block;
            margin-top: 5px;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .play-btn:hover { transform: scale(1.1); }

        .status-badge {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
        }

        .volume-container {
            width: 100%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="radio-icon">📻</div>
    <h1 id="stationNameDisplay">Radio Live</h1>

    <div class="track-info-container">
        <div class="marquee-content" id="marqueeBox">
            <span class="artist-name" id="artist">Artist i Panjohur</span>
            <span class="song-title" id="songTitle">Duke u lidhur me serverin...</span>
        </div>
    </div>

    <div class="controls">
        <button class="play-btn" id="playBtn">▶</button>
        <div id="status" class="status-badge">Gati</div>
        
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="1">
            <span>🔊</span>
        </div>
    </div>

    <audio id="radioAudio" crossorigin="anonymous"></audio>
</div>

<script>
    const audio = document.getElementById('radioAudio');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const artistDisplay = document.getElementById('artist');
    const songDisplay = document.getElementById('songTitle');
    const volumeSlider = document.getElementById('volume');

    // Merr parametrat nga URL
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('stream');
    const name = urlParams.get('name') || 'Radio Online';

    document.getElementById('stationNameDisplay').innerText = name;

    if (streamUrl) {
        audio.src = streamUrl;
    } else {
        status.innerText = "Mungon URL!";
        songDisplay.innerText = "Vendosni ?stream=URL_JUAJ ne fund";
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = "⏸";
                status.innerText = "LIVE NOW";
                status.style.color = "#00ff88";
            }).catch(err => {
                status.innerText = "Klikoni Play";
            });
        } else {
            audio.pause();
            playBtn.innerText = "▶";
            status.innerText = "PAUSE";
            status.style.color = "white";
        }
    }

    playBtn.addEventListener('click', togglePlay);

    // Kontrolli i volumit
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // Funksioni për të marrë Metadata (Artistin dhe Titullin)
    // SHËNIM: Shumica e serverave kërkojnë CORS të lejuar.
    function fetchMetadata() {
        // Nëse nuk kemi API, tregojmë emrin e radios si artist
        // Mund të shtoni këtu linkun e API-së së radios suaj
        if(!streamUrl) return;

        // Simulim ose vendosje statike nese serveri nuk jep meta-data direkt
        // artistDisplay.innerText = "Emri Artistit"; 
        // songDisplay.innerText = "Titulli i Kenges";
    }

    // Refresh metadata cdo 15 sekonda
    setInterval(fetchMetadata, 15000);
    fetchMetadata();

    // Eventet e audios
    audio.onwaiting = () => status.innerText = "Duke u ngarkuar...";
    audio.onplaying = () => status.innerText = "LIVE NOW";
    audio.onerror = () => {
        status.innerText = "Gabim ne transmetim!";
        status.style.color = "#ff4444";
    };
</script>

</body>
</html>
