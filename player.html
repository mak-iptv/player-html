<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Radio Player</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 2rem;
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .radio-icon {
            font-size: 50px;
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        /* Marquee Styles */
        .track-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .artist-name {
            font-weight: bold;
            display: block;
            color: #fff;
            font-size: 1.1rem;
        }

        .song-title {
            color: var(--primary);
            font-size: 0.9rem;
            margin-top: 5px;
            display: block;
        }

        .marquee-wrapper {
            white-space: nowrap;
            overflow: hidden;
            position: relative;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .play-btn:hover { transform: scale(1.1); }

        .status-badge {
            font-size: 0.8rem;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Volume Slider */
        .volume-container {
            width: 100%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: var(--primary);
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="radio-icon">📻</div>
    <h1 id="stationNameDisplay">Radio Live</h1>

    <div class="track-info">
        <div class="marquee-wrapper">
            <div class="marquee-content">
                <span class="artist-name" id="artist">Duke u lidhur...</span>
                <span class="song-title" id="songTitle">Ju lutem prisni</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="play-btn" id="playBtn">▶</button>
        <div id="status" class="status-badge">Gati për transmetim</div>
        
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
            <span>🔊</span>
        </div>
    </div>

    <audio id="radioAudio" preload="auto"></audio>
</div>

<script>
    const audio = document.getElementById('radioAudio');
    const playBtn = document.getElementById('playBtn');
    const status = document.getElementById('status');
    const artistDisplay = document.getElementById('artist');
    const songDisplay = document.getElementById('songTitle');
    const volumeSlider = document.getElementById('volume');

    // Merr parametrat nga URL
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('stream');
    const name = urlParams.get('name') || 'Radio Online';

    document.getElementById('stationNameDisplay').innerText = name;

    if (streamUrl) {
        audio.src = streamUrl;
    } else {
        status.innerText = "Mungon URL e stream-it!";
    }

    // Funksioni për Play/Pause
    function togglePlay() {
        if (audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = "⏸";
                status.innerText = "LIVE NOW";
                status.style.color = "#00ff88";
            }).catch(err => {
                console.log("Autoplay i bllokuar, kërkohet klikim.");
            });
        } else {
            audio.pause();
            playBtn.innerText = "▶";
            status.innerText = "PAUSE";
            status.style.color = "white";
        }
    }

    playBtn.addEventListener('click', togglePlay);

    // Provon autoplay sapo faqja ngarkohet (shpesh bllokohet nga browseri)
    window.addEventListener('load', () => {
        togglePlay();
        // Nëse bllokohet, përdoruesi do klikojë butonin
    });

    // Kontrolli i volumit
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // Simulimi i marrjes së titullit të këngës
    // (Për transmetime reale, kjo kërkon një API nga serveri i radios)
    function updateMetadata() {
        // Këtu mund të vendosni një Fetch API nëse radioja juaj e ofron
        // Për momentin po e lëmë statike ose me emrin e radios
        artistDisplay.innerText = name;
        songDisplay.innerText = "Duke transmetuar live...";
    }

    updateMetadata();

    // Eventet e audios
    audio.onwaiting = () => status.innerText = "Duke u ngarkuar...";
    audio.onplaying = () => status.innerText = "LIVE NOW";
    audio.onerror = () => {
        status.innerText = "Gabim në lidhje!";
        status.style.color = "#ff4444";
    };
</script>

</body>
</html>
