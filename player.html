<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Radio Player</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 1.5rem;
            border-radius: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .radio-icon {
            font-size: 50px;
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 1.5rem;
            word-break: break-word;
        }

        /* Marquee i pafund pa boshllëk */
        .track-info-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px 0;
            margin-bottom: 2rem;
            overflow: hidden;
            position: relative;
            height: 80px;
            display: flex;
            align-items: center;
        }

        .marquee-wrapper {
            white-space: nowrap;
            display: inline-block;
            animation: marquee 20s linear infinite;
            padding-left: 0;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
        }

        .marquee-content span {
            display: inline-block;
            margin-right: 40px;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .artist-name {
            font-weight: bold;
            color: #fff;
            font-size: 1.2rem;
        }

        .song-title {
            color: var(--primary);
            font-size: 1rem;
            margin-left: 12px;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .play-btn:hover { transform: scale(1.1); }

        .status-badge {
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            text-transform: uppercase;
        }

        .volume-container {
            width: 100%;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type=range] {
            flex-grow: 1;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .meta-note {
            font-size: 0.7rem;
            margin-top: 15px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div class="radio-icon">📻</div>
    <h1 id="stationNameDisplay">Radio Live</h1>

    <div class="track-info-container">
        <div class="marquee-wrapper" id="marqueeWrapper">
            <div class="marquee-content" id="marqueeContent">
                <span><span class="artist-name" id="artist">Artist</span><span class="song-title" id="songTitle">Titulli</span></span>
                <span><span class="artist-name" id="artist2">Artist</span><span class="song-title" id="songTitle2">Titulli</span></span>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="play-btn" id="playBtn">▶</button>
        <div id="status" class="status-badge">Gati</div>
        
        <div class="volume-container">
            <span>🔈</span>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.7">
            <span>🔊</span>
        </div>
    </div>
    <div class="meta-note" id="metaNote">🎵 Metadata përditësohet çdo 15 sekonda</div>
    <audio id="radioAudio" crossorigin="anonymous"></audio>
</div>

<script>
    const audio = document.getElementById('radioAudio');
    const playBtn = document.getElementById('playBtn');
    const statusDiv = document.getElementById('status');
    const volumeSlider = document.getElementById('volume');

    // Elementet e marquee (dy kopje)
    const artistSpan = document.getElementById('artist');
    const titleSpan = document.getElementById('songTitle');
    const artistSpan2 = document.getElementById('artist2');
    const titleSpan2 = document.getElementById('songTitle2');

    // Lexo parametrat nga URL
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('stream');
    const stationName = urlParams.get('name') || 'Radio Online';
    const metaApiUrl = urlParams.get('metaUrl');
    const staticArtist = urlParams.get('artist');
    const staticTitle = urlParams.get('title');

    document.getElementById('stationNameDisplay').innerText = stationName;

    // Nëse nuk ka stream, trego gabim
    if (!streamUrl) {
        statusDiv.innerText = "Mungon URL!";
        statusDiv.style.color = "#ff8888";
        document.getElementById('metaNote').innerText = "❌ Shto ?stream=URL_RADIOS ne URL";
        updateMetadataDisplay("Gabim", "Vendos stream URL");
    } else {
        audio.src = streamUrl;
        startMetadataFetching();
    }

    // Funksion për të përditësuar pamjen e marquee (të dy kopjet)
    function updateMetadataDisplay(artist, title) {
        const cleanArtist = artist?.trim() || stationName;
        const cleanTitle = title?.trim() || "Duke luajtur...";
        artistSpan.innerText = cleanArtist;
        titleSpan.innerText = cleanTitle;
        artistSpan2.innerText = cleanArtist;
        titleSpan2.innerText = cleanTitle;
    }

    // Marrja e metadata-s
    async function fetchMetadata() {
        if (!streamUrl) return;

        // 1. Nëse ka metaUrl (API e jashtme)
        if (metaApiUrl) {
            try {
                const response = await fetch(metaApiUrl);
                if (response.ok) {
                    const data = await response.json();
                    const artist = data.artist || data.Artist || data.interpret || "Artist";
                    const title = data.title || data.Title || data.song || "Këngë";
                    updateMetadataDisplay(artist, title);
                    return;
                }
            } catch(e) { console.warn("Meta API error", e); }
        }

        // 2. Nëse janë dhënë static parametrat artist&title
        if (staticArtist && staticTitle) {
            updateMetadataDisplay(staticArtist, staticTitle);
            return;
        }

        // 3. Përpjekje për të marrë metadata nga Icecast / SHOUTcast në mënyrë automatike
        try {
            let baseUrl = streamUrl;
            // Heq parametrat e mundshëm
            if (baseUrl.includes('?')) baseUrl = baseUrl.split('?')[0];
            
            // Provon për Icecast (status-json.xsl)
            let icecastUrl = baseUrl.replace(/\/[^/]*\.(mp3|ogg|aac|m3u|pls)$/i, '/status-json.xsl');
            if (icecastUrl === baseUrl && !baseUrl.endsWith('.xsl')) icecastUrl = baseUrl + '/status-json.xsl';
            
            const resp = await fetch(icecastUrl, { cache: 'no-store' });
            if (resp.ok) {
                const text = await resp.text();
                // Kërkon icecast format
                const match = text.match(/"artist"\s*:\s*"([^"]+)"/i);
                const matchTitle = text.match(/"title"\s*:\s*"([^"]+)"/i);
                if (match && matchTitle) {
                    updateMetadataDisplay(match[1], matchTitle[1]);
                    return;
                }
            }
        } catch(e) { /* nëse dështon, vazhdo */ }

        // 4. Provon për SHOUTcast 7.html
        try {
            let scUrl = streamUrl;
            if (scUrl.includes(';')) scUrl = scUrl.split(';')[0];
            scUrl = scUrl.replace(/\/[^/]*\.(mp3|pls|m3u)$/i, '/7.html');
            if (!scUrl.endsWith('/7.html')) scUrl = scUrl + '/7.html';
            
            const resp = await fetch(scUrl, { cache: 'no-store' });
            if (resp.ok) {
                const html = await resp.text();
                // Formati tipik: <body>123,1,2,3,Artisti - Titulli</body>
                const match = html.match(/<body>.*?,\s*([^<]+)<\/body>/i);
                if (match && match[1]) {
                    let parts = match[1].split(' - ');
                    if (parts.length === 1) parts = match[1].split(' – ');
                    let artist = parts.length > 1 ? parts[0] : stationName;
                    let title = parts.length > 1 ? parts[1] : parts[0];
                    updateMetadataDisplay(artist, title);
                    return;
                }
            }
        } catch(e) {}

        // Nëse asnjë metodë nuk funksionoi, trego emrin e radios
        updateMetadataDisplay(stationName, "🎵 Pa metadata");
        document.getElementById('metaNote').innerHTML = "ℹ️ Për metadata, shto &metaUrl=API ose &artist=...&title=...";
    }

    function startMetadataFetching() {
        fetchMetadata();
        setInterval(fetchMetadata, 15000);
    }

    // Kontrollet e audios
    function togglePlay() {
        if (audio.paused) {
            audio.play().then(() => {
                playBtn.innerText = "⏸";
                statusDiv.innerText = "LIVE NOW";
                statusDiv.style.color = "#00ff88";
            }).catch(err => {
                statusDiv.innerText = "Kliko manualisht";
                statusDiv.style.color = "#ffaa00";
                console.warn("Autoplay i bllokuar:", err);
            });
        } else {
            audio.pause();
            playBtn.innerText = "▶";
            statusDiv.innerText = "PAUSE";
            statusDiv.style.color = "white";
        }
    }

    playBtn.addEventListener('click', togglePlay);
    volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value;
    });

    // Eventet e audios
    audio.onwaiting = () => { statusDiv.innerText = "Buffer..."; statusDiv.style.color = "#ffaa00"; };
    audio.onplaying = () => { statusDiv.innerText = "LIVE NOW"; statusDiv.style.color = "#00ff88"; };
    audio.onerror = () => {
        statusDiv.innerText = "Gabim në transmetim!";
        statusDiv.style.color = "#ff4444";
        updateMetadataDisplay(stationName, "❌ Kontrollo URL-në e stream-it");
    };
    
    // Nëse stream-i ka metadata ICY, mund të përdoret audio.onloadedmetadata, por jo të gjithë e dërgojnë
    if ('mediaSession' in navigator) {
        audio.addEventListener('loadedmetadata', () => {
            // Disa radio e dërgojnë titullin në metadata të stream-it
        });
    }
</script>
</body>
</html>
